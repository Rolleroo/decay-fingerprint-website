# Streamlit runtime configuration (read by both local runs and Hugging Face
# Spaces).

[server]
# First-line cap on upload size (MB) -- a results table is kilobytes, so 1 MB
# (Streamlit's practical minimum) is already very generous. app/ingest.py
# enforces a tighter post-decompression bound as defence in depth.
maxUploadSize = 1

[browser]
gatherUsageStats = false

[theme]
# Sober "scientific instrument" palette for a waste-management / health-physics
# audience: a calm slate-teal accent (deliberately not an alarm colour), cool
# neutral greys, near-black text. Restrained and legible, not consumer-flashy.
base = "light"
primaryColor = "#2b6777"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#eef2f5"
textColor = "#1f2328"
font = "sans serif"
